name: Multi-Cloud Enterprise Reusable CI/CD Pipeline

on:
  workflow_call:
    inputs:
      cloud:
        required: true
        type: string

      aws_region:
        required: false
        type: string

      gcp_region:
        required: false
        type: string

      java_dir:
        required: false
        type: string

      python_dir:
        required: false
        type: string

      node_dir:
        required: false
        type: string

      image_name:
        required: false
        type: string

      ecr_repo:
        required: false
        type: string

      helm_chart_path:
        required: false
        type: string

      codeartifact_domain:
        required: false
        type: string

      codeartifact_repo:
        required: false
        type: string

      domain_owner:
        required: false
        type: string    

      role-to-assume:
        required: false
        type: string  

permissions:
  id-token: write
  contents: read

env:

  JAVA_DIR: ${{ inputs.java_dir }}
  PYTHON_DIR: ${{ inputs.python_dir }}
  NODE_DIR: ${{ inputs.node_dir }}
  IMAGE_NAME: ${{ inputs.image_name }}
  VERSION: v${{ github.run_number }}
  ECR_REPO: ${{ inputs.ecr_repo }}
  AWS_REGION: ${{ inputs.aws_region }}
  ROLE_ARN : ${{ inputs.role-to-assume }}
  GCP_REGION: ${{ inputs.gcp_region }}
  HELM_PATH: ${{ inputs.helm_chart_path }}
  CODEARTIFACT_DOMAIN: ${{ inputs.codeartifact_domain }}
  CODEARTIFACT_REPO: ${{ inputs.codeartifact_repo }}
  DOMAIN_OWNER: ${{ inputs.domain_owner }}

# ==========================================================
# =================  BUILD & UNIT TEST =====================
# ==========================================================

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------------- JAVA ----------------

      - name: Setup Java
        if: ${{ hashFiles(format('{0}/pom.xml', env.JAVA_DIR)) != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Java Build & Test
        if: ${{ hashFiles(format('{0}/pom.xml', env.JAVA_DIR)) != '' }}
        run: |
          cd $JAVA_DIR
          mvn clean verify

      # ---------------- PYTHON ----------------

      - name: Setup Python
        if: ${{ hashFiles(format('{0}/requirements.txt', env.PYTHON_DIR)) != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Python Test
        if: ${{ hashFiles(format('{0}/requirements.txt', env.PYTHON_DIR)) != '' }}
        run: |
          cd $PYTHON_DIR
          pip install -r requirements.txt
          pip install pytest
          pytest

      # ---------------- NODE ----------------

      - name: Setup Node
        if: ${{ hashFiles(format('{0}/package.json', env.NODE_DIR)) != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Node Test
        if: ${{ hashFiles(format('{0}/package.json', env.NODE_DIR)) != '' }}
        run: |
          cd $NODE_DIR
          npm install
          npm test -- --watchAll=false
