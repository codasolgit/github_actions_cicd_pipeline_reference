# ==========================================================
# ================= DOCKER BUILD & PUSH ====================
# ==========================================================

  docker-build-push:
    runs-on: ubuntu-latest
    # needs:  upload-artifact
    steps:
      - uses: actions/checkout@v4
      
      # BUILD IMAGE

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$VERSION .
          docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:latest

# ================= AWS =================

      - name: Configure AWS Credentials
        if: inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to AWS ECR
        if: inputs.cloud == 'aws'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to AWS ECR
        if: inputs.cloud == 'aws'
        run: |
          docker tag $IMAGE_NAME:$VERSION ${{ secrets.AWS_ECR_URL }}/$ECR_REPO:$VERSION
          docker tag $IMAGE_NAME:latest ${{ secrets.AWS_ECR_URL }}/$ECR_REPO:latest

          docker push ${{ secrets.AWS_ECR_URL }}/$ECR_REPO:$VERSION
          docker push ${{ secrets.AWS_ECR_URL }}/$ECR_REPO:latest

# ================= GCP =================

      - name: Authenticate to GCP
        if: inputs.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        if: inputs.cloud == 'gcp'
        run: gcloud auth configure-docker

      - name: Push to GCR
        if: inputs.cloud == 'gcp'
        run: |
          docker tag $IMAGE_NAME:$VERSION gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME:$VERSION
          docker tag $IMAGE_NAME:latest gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME:latest

          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME:$VERSION
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME:latest

# ================= AZURE =================

      - name: Azure Login
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Push to Azure ACR
        if: inputs.cloud == 'azure'
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker tag $IMAGE_NAME:$VERSION ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:$VERSION
          docker tag $IMAGE_NAME:latest ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:latest

          docker push ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:$VERSION
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:latest
          


# ==========================================================
# ================= HELM DEPLOYMENT (CD) ===================
# ==========================================================

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
  
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
  
      - name: Setup Helm
        uses: azure/setup-helm@v4
  
  # ================= AWS AUTH =================
  
      - name: Configure AWS Credentials
        if: inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
  
      - name: Verify AWS Identity
        if: inputs.cloud == 'aws'
        run: aws sts get-caller-identity
  
  # ================= CONNECT EKS =================
  
      - name: Update kubeconfig
        if: inputs.cloud == 'aws'
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}
  
  # ================= VERIFY CLUSTER =================
  
      - name: Check Kubernetes Context
        if: inputs.cloud == 'aws'
        run: |
          kubectl config get-contexts
          kubectl cluster-info
  
      - name: Verify Nodes
        if: inputs.cloud == 'aws'
        run: |
          kubectl get nodes
  
  # ================= HELM DEPLOY =================
  
      - name: Deploy Application
        if: inputs.cloud == 'aws'
        run: |
          helm upgrade --install multiapp ${{ env.HELM_PATH }} \
            --namespace default \
            --create-namespace \
            --set image.repository=${{ secrets.AWS_ECR_URL }}/${{ env.ECR_REPO }} \
            --set image.tag=${{ env.VERSION }}

# ================= GCP GKE =================

      - name: Authenticate to GCP
        if: inputs.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE Credentials
        if: inputs.cloud == 'gcp'
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
            --region $GCP_REGION \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Helm Deploy GKE
        if: inputs.cloud == 'gcp'
        run: |
          helm upgrade --install multiapp $HELM_PATH \
            --set image.repository=gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME \
            --set image.tag=$VERSION

# ================= AZURE AKS =================

      - name: Azure Login
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Connect AKS
        if: inputs.cloud == 'azure'
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RG }} \
            --name ${{ secrets.AKS_CLUSTER }}

      - name: Helm Deploy AKS
        if: inputs.cloud == 'azure'
        run: |
          helm upgrade --install multiapp $HELM_PATH \
            --set image.repository=${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME \
            --set image.tag=$VERSION
